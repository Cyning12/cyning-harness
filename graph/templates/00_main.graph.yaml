graph_id: "00_main"
title: "顶层流程总图"
description: "模板包主入口分发与典型子流程路由"
version: "2026-06-30"

nodes:
  - id: "Q"
    label: "用户 / 客户端请求"
  - id: "E"
    label: "应用入口"
  - id: "M1"
    label: "核心业务处理"
  - id: "M2"
    label: "次要路径"
  - id: "ADM"
    label: "Admin / Job"
  - id: "FLOW_MAIN"
    label: "主路径子流程"
  - id: "FLOW_DOC"
    label: ">10_flow_MAIN.md"
  - id: "DB"
    label: "持久化"
  - id: "STRUCT_DOC"
    label: ">01_struct.md"

edges:
  - from: "Q"
    to: "E"
    label: "->"
    anchors:
      - path: "src/main.py"
        line: 1
      - path: "app/router/index.ts"
        line: 1
  - from: "E"
    to: "M1"
    label: "主路径 A"
    anchors:
      - path: "handlers/resource.py"
        symbol: "handle_create"
  - from: "E"
    to: "M2"
    label: "主路径 B"
    anchors:
      - path: "handlers/health.py"
        symbol: "health_check"
  - from: "E"
    to: "ADM"
    label: "管理/批处理"
    anchors:
      - path: "jobs/ingest.py"
        symbol: "run_sync"
  - from: "M1"
    to: "FLOW_MAIN"
    mark: "::triggers"
    type: "triggers"
  - from: "FLOW_MAIN"
    to: "FLOW_DOC"
    label: "加载"
  - from: "M1"
    to: "DB"
    label: "->"
    anchors:
      - path: "db/repository.py"
  - from: "ADM"
    to: "DB"
    label: "->"
    anchors:
      - path: "db/repository.py"
  - from: "E"
    to: "STRUCT_DOC"
    label: "加载"

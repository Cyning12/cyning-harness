graph_id: "10_flow_MAIN"
title: "主路径 Flow 示例"
description: "典型 HTTP 请求从入口到响应的主干流程"
version: "2026-06-30"

nodes:
  - id: "IN"
    label: "HTTP 请求"
  - id: "AUTH"
    label: "鉴权 / 会话校验"
  - id: "VAL"
    label: "参数校验"
  - id: "SVC"
    label: "业务服务层"
  - id: "ERR_AUTH"
    label: "Auth Failed"
  - id: "ERR_VAL"
    label: "Validation Failed"
  - id: "REPO"
    label: "仓储 / ORM"
  - id: "DB"
    label: "数据库 / 存储"
  - id: "HIT"
    label: "record exists?"
  - id: "NOTFOUND"
    label: "404 / 空结果"
  - id: "BIZERR"
    label: "4xx 业务错误"
  - id: "RESP"
    label: "组装响应 DTO"
  - id: "OUT"
    label: "返回 JSON / 页面"
  - id: "LOG"
    label: "结构化日志"
  - id: "MAIN_DOC"
    label: ">00_main.md"

edges:
  - from: "IN"
    to: "AUTH"
    label: "->"
    anchors:
      - path: "middleware/auth.py"
        symbol: "require_user"
  - from: "AUTH"
    to: "VAL"
    label: "[ok]"
  - from: "AUTH"
    to: "ERR_AUTH"
    label: "[err]"
    anchors:
      - path: "middleware/auth.py"
        line: 42
  - from: "VAL"
    to: "SVC"
    label: "[ok]"
    anchors:
      - path: "services/resource_service.py"
        symbol: "handle"
  - from: "VAL"
    to: "ERR_VAL"
    label: "[err]"
  - from: "SVC"
    to: "REPO"
    label: "->"
    anchors:
      - path: "repositories/resource_repo.py"
        symbol: "find_by_id"
  - from: "REPO"
    to: "DB"
    label: "->"
    anchors:
      - path: "db/session.py"
  - from: "REPO"
    to: "HIT"
    label: "?>"
  - from: "HIT"
    to: "NOTFOUND"
    label: "[no]"
  - from: "HIT"
    to: "SVC"
    label: "[yes]"
  - from: "SVC"
    to: "BIZERR"
    label: "[err]"
    anchors:
      - path: "services/resource_service.py"
  - from: "SVC"
    to: "RESP"
    label: "->"
  - from: "RESP"
    to: "OUT"
    label: "->"
    anchors:
      - path: "handlers/resource.py"
        symbol: "to_response"
  - from: "OUT"
    to: "LOG"
    mark: "::archives"
    type: "archives"
    anchors:
      - path: "observability/logger.py"
  - from: "IN"
    to: "MAIN_DOC"
    label: "加载"

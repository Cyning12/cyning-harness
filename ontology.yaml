# cyning-harness 产品设计本体 · 机器可读抽取（草案 v0.4.0）
# 人类真值：docs/methodology/product/DESIGN_ONTOLOGY_v1_zh.md
# 冲突时以 Markdown 为准 · 供未来 harness ontology-check 使用

version: "1.2"
product_semver: "0.4.0"
license: MIT

classes:
  - id: Track
    domain: Package
    subclasses: [GraphTrack, WikiTrack, StandardsTrack, ProcessTrack, VerifyTrack, IDETrack]
  - id: Template
    domain: Package
  - id: Preset
    domain: Package
  - id: WizardTool
    domain: Package
  - id: IDEFragment
    domain: Package
  - id: AdoptedProfile
    domain: Instance
  - id: VersionManifest
    domain: Instance
  - id: Task
    domain: Instance
  - id: Hat
    domain: Instance
  - id: HumanGate
    domain: Instance
  - id: InvokeSnapshot
    domain: Instance
  - id: AuditReview
    domain: Instance
  - id: InformArtifact
    domain: Instance
  - id: ConstrainArtifact
    domain: Instance
  - id: VerifyArtifact
    domain: Instance

relations:
  - id: embedsInto
    subject: DisciplinePackage
    object: BusinessRepository
    cardinality: "1..*"
  - id: blocks
    subject: HumanGate
    object: Hat
    cardinality: "1..*"
  - id: governedBy
    subject: Task
    object: Hat
    cardinality: "1..*"
  - id: produces
    subject: Hat
    object: TraceArtifact
    cardinality: "0..*"

axioms:
  - id: P1
    text: "纪律包不含业务代码与 LLM Runtime"
  - id: S2
    text: "禁止 sync 覆盖 docs/tasks、reviews、invokes/by-task"
  - id: S5
    text: "harness-sync apply 前须 git-clean（可 --force 跳过）"
  - id: D2
    text: "HG-AUDIT-R1 pending 时 22 不得附 30 Prompt"
  - id: D7
    text: "public push 须 HG-RELEASE 人闸 checklist 全勾"

starter_hats:
  - hat_id: "10-requirements"
    role: RequirementsHat
  - hat_id: "22-task-audit"
    role: TaskAuditHat
  - hat_id: "30-execute-code"
    role: ExecuteHat
  - hat_id: "40-self-check"
    role: SelfCheckHat

human_gates:
  - id: HG-TASK-DRAFT
    blocks_hats: ["22-task-audit", "30-execute-code"]
  - id: HG-AUDIT-R1
    blocks_hats: ["30-execute-code"]
  - id: HG-RELEASE
    blocks_hats: []
    note: "维护者 CLOSE · npm/GitHub public · 非 Agent 自动签"

schemas:
  manifest: "./schema/manifest.v1.schema.json"
  task_sidecar: "./schema/task.harness.v1.schema.json"
